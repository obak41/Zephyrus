apiVersion: v1
kind: Service
metadata:
  name: zephyrus-mongodb-svc
  namespace: zephyrus
spec:
  clusterIP: None
  ports:
    - port: 27017
  selector:
    app: zephyrus-mongodb
---
apiVersion: v1
kind: Service
metadata:
  name: zephyrus-mongodb-svc
  namespace: zephyrus
spec:
  clusterIP: None
  ports:
    - port: 27017
  selector:
    app: zephyrus-mongodb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zephyrus-mongodb
  namespace: zephyrus
spec:
  serviceName: "zephyrus-mongodb-svc"
  replicas: 1
  selector:
    matchLabels:
      app: zephyrus-mongodb
  template:
    metadata:
      labels:
        app: zephyrus-mongodb
    spec:
      initContainers:
        - name: remove-lock-file
          image: busybox:1.28
          command:
            - sh
            - -c
            - |
              rm -f /data/db/mongod.lock
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      containers:
        - name: mongo
          image: mongo:8.0
          command: ["bash", "-c"]
          args:
            - |
              ulimit -n 64000
              exec mongod --bind_ip_all
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 60
            periodSeconds: 20
          ports:
            - containerPort: 27017
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "2"
          env:
            - name: MONGO_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: MONGO_ROOT_USERNAME
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: MONGO_ROOT_PASSWORD
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
        labels:
          app.kubernetes.io/part-of: zephyrus-bot
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zephyrus
  namespace: zephyrus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zephyrus
  template:
    metadata:
      labels:
        app: zephyrus
    spec:
      initContainers:
        - name: wait-for-mongo
          image: busybox:1.28
          command:
            - sh
            - -c
            - |
              until nc -zv zephyrus-mongodb-svc 27017; do
                echo "waiting for mongodb-service..."
                sleep 2
              done
      containers:
        - name: bot
          image: ghcr.io/penti-nameko/zephyrus-bot:v1.0
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: zephyrus-secrets
          env:
            - name: TOKEN  # アプリケーション側が小文字を期待する場合のエイリアス
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: TOKEN
            - name: MONGO_HOST
              value: "zephyrus-mongodb-svc" 
            - name: MONGO_PORT
              value: "27017"
            - name: GEMINI_API_KEY_1
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: GEMINI_API_KEY_1
            - name: GEMINI_API_KEY_2
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: GEMINI_API_KEY_2
            - name: GEMINI_API_KEY_3
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: GEMINI_API_KEY_3
            - name: GEMINI_API_KEY_4
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: GEMINI_API_KEY_4
            - name: GEMINI_API_KEY_FOR_AUTOMOD
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: GEMINI_API_KEY_FOR_AUTOMOD
            - name: AICHAT_LOG_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: AICHAT_LOG_WEBHOOK
            - name: SAFE_BROWSING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: SAFE_BROWSING_API_KEY
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: MONGO_URI
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"