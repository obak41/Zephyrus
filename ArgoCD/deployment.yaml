apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: zephyrus
spec:
  ports:
    - port: 27017
  selector:
    app: mongodb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: zephyrus
spec:
  serviceName: "mongodb-service"
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      # MongoDBのロックファイルを掃除するInitContainerを追加
      initContainers:
        - name: remove-lock-file
          image: busybox:1.28
          command:
            - sh
            - -c
            - |
              rm -f /data/db/mongod.lock
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      containers:
        - name: mongo
          image: mongo:latest
          ports:
            - containerPort: 27017
          # メモリ不足でのクラッシュ(OOM)を防ぐためにリソースを明示
          resources:
            limits:
              memory: "1Gi"
              cpu: "500m"
            requests:
              memory: "512Mi"
              cpu: "250m"
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: MONGO_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: MONGO_ROOT_PASSWORD
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zephyrus-bot
  namespace: zephyrus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zephyrus-bot
  template:
    metadata:
      labels:
        app: zephyrus-bot
    spec:
      # MongoDBがポートを開けるまで待機する
      initContainers:
        - name: wait-for-mongo
          image: busybox:1.28
          command:
            - sh
            - -c
            - |
              until nc -zv mongodb-service 27017; do
                echo "waiting for mongodb-service..."
                sleep 2
              done
      containers:
        - name: bot
          # 【重要】ここを実際のレジストリURLに書き換えてください
          # 例: ghcr.io/your-github-user/zephyrus-bot:latest
          image: ghcr.io/penti-nameko/zephyrus-bot:v0.5
          imagePullPolicy: Always
          env:
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: token
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: MONGO_URI
            - name: GEMINI_API_KEY_1
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: GEMINI_API_KEY_1
            - name: GEMINI_API_KEY_FOR_AUTOMOD
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: GEMINI_API_KEY_FOR_AUTOMOD
            - name: SAFE_BROWSING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: SAFE_BROWSING_API_KEY
          volumeMounts:
            - name: env-file
              mountPath: /app/.env
              subPath: .env
            - name: env-file
              mountPath: /app/cogs/.env
              subPath: .env
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: env-file
          secret:
            secretName: zephyrus-secrets
            items:
              - key: ENV_FILE_CONTENT
                path: .env