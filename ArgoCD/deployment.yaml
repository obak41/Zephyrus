apiVersion: apps/v1
kind: Deployment
metadata:
  name: zephyrus-bot
  namespace: zephyrus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zephyrus-bot
  template:
    metadata:
      labels:
        app: zephyrus-bot
    spec:
      initContainers:
        - name: wait-for-mongo
          image: busybox:1.28
          command:
            - sh
            - -c
            - |
              until nc -zv mongodb-service 27017; do
                echo "waiting for mongodb-service..."
                sleep 2
              done
      containers:
        - name: bot
          image: ghcr.io/penti-nameko/zephyrus-bot:v0.5
          imagePullPolicy: Always
          # 個別に設定しなくても、これ1つでSecret内の全データを環境変数として読み込みます
          envFrom:
            - secretRef:
                name: zephyrus-secrets
          # もしアプリ側が「TOKEN」ではなく「token」という小文字の名前を期待しているなら
          # 以下のように個別に書くスタイルを残してもOKです（その場合、keyは大文字に合わせます）
          env:
            - name: token
              valueFrom:
                secretKeyRef:
                  name: zephyrus-secrets
                  key: TOKEN
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"