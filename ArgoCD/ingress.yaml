apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zephyrus-ingress
  namespace: zephyrus
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # ここには rewrite-target を書かない（グローバルに適用されるのを防ぐ）
spec:
  ingressClassName: nginx
  rules:
    - host: zephyrus.uniproject.jp
      http:
        paths:
          # フロントエンド（rewriteなし：/assets/xxx がそのまま届く）
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zephyrus-web-service
                port:
                  number: 3000
  tls:
    - hosts:
        - zephyrus.uniproject.jp
      secretName: zephyrus-uniproject-jp-tls